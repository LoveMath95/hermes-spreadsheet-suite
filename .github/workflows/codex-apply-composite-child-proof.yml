name: Codex Apply Composite Child Proof Patch

on:
  push:
    branches:
      - codex/fix-composite-child-proof

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply patch script
        run: node .codex/apply-composite-child-proof.js
      - name: Remove temporary files and commit
        run: |
          rm -f .codex/apply-composite-child-proof.js
          rmdir .codex 2>/dev/null || true
          rm -f .github/workflows/codex-apply-composite-child-proof.yml
          git config user.name "LoveMath95"
          git config user.email "84611073+LoveMath95@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "fix(writeback): require composite child completion proof"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
