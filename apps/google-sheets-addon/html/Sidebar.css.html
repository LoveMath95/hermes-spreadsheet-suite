<style>
  :root {
    --bg: #f8fafc;
    --panel: #ffffff;
    --ink: #0f172a;
    --muted: #64748b;
    --border: #dbe4ee;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: linear-gradient(180deg, #f8fafc 0%, #eef4f9 100%);
    color: var(--ink);
    font: 13px/1.45 Arial, sans-serif;
  }

  .shell {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
  }

  .header {
    padding: 12px 14px 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .messages {
    overflow-y: auto;
    padding: 0 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bubble {
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 14px;
    padding: 10px 12px;
    white-space: pre-wrap;
  }

  .user .bubble {
    background: #dbeafe;
    border-color: #bfdbfe;
  }

  .proof,
  .status-line,
  .trace-line,
  .meta-line,
  .warning-line {
    margin-top: 4px;
    font-size: 11px;
    color: var(--muted);
  }

  .trace-line {
    white-space: pre-wrap;
  }

  .composer {
    position: sticky;
    bottom: 0;
    padding: 10px 14px 14px;
    background: rgba(248, 250, 252, 0.96);
    border-top: 1px solid rgba(148, 163, 184, 0.2);
  }

  .input-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: end;
    gap: 8px;
  }

  .attach-button,
  #send-button {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  #prompt {
    width: 100%;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 11px;
    background: #fff;
    color: var(--ink);
    font: inherit;
  }

  .hidden-input {
    display: none;
  }

  .attachment-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-bottom: 8px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    padding: 4px 8px;
    font-size: 11px;
  }

  .chip img {
    width: 22px;
    height: 22px;
    object-fit: cover;
    border-radius: 4px;
  }

  .chip button {
    border: 0;
    background: transparent;
    cursor: pointer;
  }

  .chip-status {
    color: var(--muted);
  }

  .preview {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #fff;
    overflow: hidden;
  }

  .preview-meta {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }

  .preview table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .preview th,
  .preview td {
    padding: 6px 8px;
    border-top: 1px solid var(--border);
    text-align: left;
  }

  .preview-actions {
    display: flex;
    gap: 8px;
    padding: 8px;
  }

  .preview-actions button {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    padding: 6px 10px;
    cursor: pointer;
  }

  .formula-block {
    margin: 0;
    padding: 10px 12px;
    font: 12px/1.45 "Courier New", monospace;
    white-space: pre-wrap;
    overflow-x: auto;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .suggestion {
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    color: var(--ink);
    padding: 4px 8px;
    font: inherit;
    cursor: pointer;
  }

  .key-points {
    margin: 0;
    padding: 0 20px 10px;
    color: var(--ink);
  }
</style>
